<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaCorp | Employee Portal</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f8fbff 0%, #eef4ff 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 430px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      padding: 32px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), #60a5fa);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }
    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }
    label {
      font-size: 0.92rem;
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.95rem;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }
    .alert {
      display: none;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.9rem;
    }
    .alert.error {
      display: block;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }
    .alert.success {
      display: block;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      padding: 12px 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn:hover { background: var(--primary-dark); }
    .footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }
    .footer a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">N</div>
      <div>
        <strong>NexaCorp</strong><br/>
        <span style="color:var(--muted);font-size:0.9rem;">Employee Portal</span>
      </div>
    </div>

    <h1>Sign in to continue</h1>
    <p>Access your dashboard, internal catalog, and daily operations from one secure place.</p>

    <div id="alert" class="alert"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter your username" autocomplete="username" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
    </div>

    <button class="btn" id="login-btn" type="button">Sign In</button>

    <div class="footer">Need access? <a href="#">Contact IT</a></div>
  </div>

  <script>
    const loginBtn = document.getElementById("login-btn");
    const alertBox = document.getElementById("alert");

    function showAlert(message, type = "error") {
      alertBox.textContent = message;
      alertBox.className = "alert " + type;
    }

    loginBtn.addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        showAlert("Please enter both your username and password.");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";

      try {
        const res = await fetch("/api/lab/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success && data.token) {
          localStorage.setItem("token", data.token);
          window.location.href = "/dashboard.html";
        } else {
          showAlert("Invalid username or password.");
        }
      } catch {
        showAlert("Unable to reach the server right now.");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
